<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Show images in Firmamento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .coords {
      font-size: 1.1em;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>Wait to load data from Firmamento</h2>

<div class="coords" id="coords"></div>


<script>

const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get("type") || "default";

// Galactic conversion constants (J2000)
const raNGP  = 192.85948 * Math.PI / 180;
const decNGP = 27.12825  * Math.PI / 180;

let coordTable = [];

// Load CSV
async function loadCoords() {

  let csvFile;

  if (type === "NGC") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/ngc.csv";
  } else if  (type === "elliptical") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/EllipticalGalaxies.csv";
  } else if  (type === "spiral") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/SpiralGalaxies.csv";
  } else if  (type === "irregular") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/IrregularGalaxies.csv";
  }

  const response = await fetch(csvFile);
  const text = await response.text();

  coordTable = text.trim()
    .split("\n")
    .slice(1)
    .map(line => {

      let ra, dec, name;
      const [name,ra,dec] = line.split(",");
      return {
        name: name,
        ra: parseFloat(ra),
        dec: parseFloat(dec)
      };
    });

  // Automatically fire when ready
  generateCoords();
}


// Convert RA/Dec → Galactic latitude
function equatorialToGalacticB(raDeg, decDeg) {

  const ra  = raDeg  * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;

  const sinb =
    Math.sin(dec) * Math.sin(decNGP) +
    Math.cos(dec) * Math.cos(decNGP) * Math.cos(ra - raNGP);

  return Math.asin(sinb) * 180 / Math.PI;
}


function generateCoords() {

  if (!coordTable.length) return;

  let entry, b;

  do {
    entry = coordTable[Math.floor(Math.random() * coordTable.length)];
    b = equatorialToGalacticB(entry.ra, entry.dec);
  }
  while (Math.abs(b) <= 10 || entry.dec < -30);

  const name  = entry.name;
  const ra  = entry.ra.toFixed(5);
  const dec = entry.dec.toFixed(5);
  const bval = b.toFixed(2);

  const url = `https://firmamento-nyuad-25ebad56567d.herokuapp.com/fbook/aladin_astronomy?survey=PanSTARRS&ra=${ra}&dec=${dec}&fov=0.2&html=Details.html&source=${name}&lang=English&item=galaxy`;

  document.getElementById("coords").innerHTML =
    `RA = ${ra}°<br>Dec = ${dec}°<br>Galactic b = ${bval}°`;

  window.location = url;
}

// Start everything
loadCoords();

</script>
</body>
</html>
