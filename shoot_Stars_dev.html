<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A shot at stars → Firmamento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .coords {
      font-size: 1.1em;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2 id="title">Loading source data...</h2>

<div class="coords" id="coords"></div>


<script>

const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get("type") || "early";

// Galactic conversion constants (J2000)
const raNGP  = 192.85948 * Math.PI / 180;
const decNGP = 27.12825  * Math.PI / 180;

let coordTable = [];

// Load CSV
async function loadCoords() {
  
  let csvFile;

  if (type == "early") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/earlyTypeStars.csv";
  } else if (type == "intermediate") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/intermediateTypeStars.csv";
  } else if (type == "late") {
     csvFile = "https://paologiommi.github.io/shootAtTheSky/lateTypeStars.csv";
  }

  const response = await fetch(csvFile);
  const text = await response.text();

  coordTable = text.trim()
    .split("\n")
    .slice(1)
    .map(line => {

      let name, ra, dec;

      [ra,dec,name] = line.split(",");
      return {
        ra: parseFloat(ra),
        dec: parseFloat(dec),
        name : name.trim()
      };
    });

  // Automatically fire when ready
  generateCoords();
}


// Convert RA/Dec → Galactic latitude
function equatorialToGalacticB(raDeg, decDeg) {

  const ra  = raDeg  * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;

  const sinb =
    Math.sin(dec) * Math.sin(decNGP) +
    Math.cos(dec) * Math.cos(decNGP) * Math.cos(ra - raNGP);

  return Math.asin(sinb) * 180 / Math.PI;
}


function generateCoords() {

  if (!coordTable.length) return;

  let entry, b, url;

  do {
    entry = coordTable[Math.floor(Math.random() * coordTable.length)];
    b = equatorialToGalacticB(entry.ra, entry.dec);
  }

  const ra  = entry.ra.toFixed(5);
  const dec = entry.dec.toFixed(5);
  const bval = b.toFixed(2);
  const name = 'HIP'+entry.name;

  alert ('type '+type)
  if (type === "early") {
     url = `https://firmamento-nyuad-25ebad56567d.herokuapp.com/fbook/aladin_astronomy?survey=DSS2&ra=${ra}&dec=${dec}&fov=0.4&html=Details.html&source=${name}&lang=English&item=EarlyTypeStar`;
  } else if (type === "intermediate") {
     url = `https://firmamento-nyuad-25ebad56567d.herokuapp.com/fbook/aladin_astronomy?survey=DSS2&ra=${ra}&dec=${dec}&fov=0.4&html=Details.html&source=${name}&lang=English&item=IntermediateTypeStar`;
  } else if (type === "late") {
     alert ('Here - late ')
     url = `https://firmamento-nyuad-25ebad56567d.herokuapp.com/fbook/aladin_astronomy?survey=DSS2&ra=${ra}&dec=${dec}&fov=0.4&html=Details.html&source=${name}&lang=English&item=LateTypeStar`;
  }

  document.getElementById("title").innerText =
    `${type} type star selected - Loading data from Firmamento`;

  document.getElementById("coords").innerHTML =
    `RA = ${ra}°<br>Dec = ${dec}°<br>Galactic b = ${bval}° <br> star name = ${name}`;
  window.location.href = url;
}

// Start everything
loadCoords();

</script>
</body>
</html>
