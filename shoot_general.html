<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show FLAT / FL16Y Sources in Firmamento</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}
.coords {
  font-size: 1.1em;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2 id="title">Loading source data...</h2>
<div class="coords" id="coords"></div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get("type") || "FL16Y";

// Galactic conversion constants
const raNGP  = 192.85948 * Math.PI / 180;
const decNGP = 27.12825  * Math.PI / 180;

let coordTable = [];


/* ---------------------- */
/*  Load CSV file         */
/* ---------------------- */
async function loadCoords() {

  let csvFile;

  if (type === "1FLAT") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/1FLAT-Sources.csv";
  } else if (type === "2FLAT") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/2FLAT-Sources.csv";
  } else if (type === "FL16Y") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/fl16y.csv";
  } else if (type === "SWIFT-RADIO") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/swiftXRTcandidates.csv";
  } else if (type === "EFEDS-RADIO") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/eFEDScandidates.csv";
  } else if (type === "ERASS1") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/erassNoRadio.csv";
  } else if (type === "RFC") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/rfc4shooting.csv";
  } else if (type === "ICE_CUBE") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/IceCube.csv";
  } else if (type === "ICECAT2PREVIEW") {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/IceCube.csv";
    //csvFile = "https://paologiommi.github.io/shootAtTheSky/IceCat2Preview.csv";
  } else {
    csvFile = "https://paologiommi.github.io/shootAtTheSky/fl16y.csv";
  }

  document.getElementById("title").innerText =
    `Loading ${type} data...`;

  try {

    const response = await fetch(csvFile);

    if (!response.ok) {
      throw new Error("Cannot load CSV file");
    }

    const text = await response.text();

    coordTable = text.trim()
      .split("\n")
      .slice(1)
      .filter(line => line.trim() !== "")
      .map(line => {

        let name, ra, dec;
        let major = 0.10;
        let minor = 0.10;
        let angle = 0.0;
        let fov   = -1;

        const cols = line.split(",").map(x => x.trim());

        if (type === "1FLAT" || type === "2FLAT") {

          [name, ra, dec] = cols;
          ra: parseFloat(ra),
          dec: parseFloat(dec),

        } else if (type === "ICE_CUBE" || type === "ICECAT2PREVIEW") {
   
          [name, ra, dec, major, minor, angle] = cols;

          major = parseFloat(major);
          minor = parseFloat(minor);
          angle = parseFloat(angle);
          fov   = major * 1.1;

        } else {

          [name, ra, dec, major, minor, angle] = cols;

          major = parseFloat(major) * 60.0;
          minor = parseFloat(minor) * 60.0;
          angle = parseFloat(angle);
          fov   = major * 1.3;
        }

        return {
          name: name,
          major: major,
          minor: minor,
          angle: angle,
          fov: fov
        };
      });

    generateCoords();

  } catch(err) {

    document.getElementById("title").innerText = "Error loading data";
    document.getElementById("coords").innerText = err.message;
  }
}


/* ---------------------- */
/*  Galactic latitude     */
/* ---------------------- */
function equatorialToGalacticB(raDeg, decDeg) {

  const ra  = raDeg  * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;

  const sinb =
      Math.sin(dec) * Math.sin(decNGP) +
      Math.cos(dec) * Math.cos(decNGP) * Math.cos(ra - raNGP);

  return Math.asin(sinb) * 180 / Math.PI;
}


/* ---------------------- */
/*  Choose random source  */
/* ---------------------- */
function generateCoords() {

  if (!coordTable.length) return;

  let entry, b;

  do {
    entry = coordTable[
      Math.floor(Math.random() * coordTable.length)
    ];

    b = equatorialToGalacticB(entry.ra, entry.dec);

  } while (Math.abs(b) <= 1.0);


  const ra    = entry.ra.toFixed(4);
  const dec   = entry.dec.toFixed(4);
  const bval  = b.toFixed(2);
  const major = Number(entry.major.toFixed(2));
  const minor = entry.minor.toFixed(2);
  const angle = entry.angle.toFixed(1);
  const name  = entry.name;
  //const fov   = (major * 1.3).toFixed(3);
  const fov   = entry.fov.toFixed(3);

  let url;

  if (entry.fov > 0) {

    url =
      `https://firmamento.nyuad.nyu.edu/data_access` +
      `?name=${name}` +
      `&ra=${ra}` +
      `&dec=${dec}` +
      `&fov=${fov}` +
      `&major=${major}` +
      `&minor=${minor}` +
      `&angle=${angle}`;

  } else {

    url =
      `https://firmamento.nyuad.nyu.edu/data_access` +
      `?name=${name}` +
      `&ra=${ra}` +
      `&dec=${dec}`;

   }
  document.getElementById("title").innerText =
    `${type} source selected - Loading data from Firmamento`;

  document.getElementById("coords").innerHTML =
    `RA = ${ra}°<br>` +
    `Dec = ${dec}°<br>` +
    `Galactic b = ${bval}°<br>` +
    `Source = ${name}`;


  setTimeout(() => {
    window.location = url;
  }, 1200);
}


/* ---------------------- */
/* Start                  */
/* ---------------------- */
loadCoords();

</script>
</body>
</html>
