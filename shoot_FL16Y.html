<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Show 1FLAT sources data in Firmamento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .coords {
      font-size: 1.1em;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>A shot at 1FLAT gamma-ray blazars </h2>


<div class="coords" id="coords"></div>


<script>

const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get("type") || "default";

// Galactic conversion constants (J2000)
const raNGP  = 192.85948 * Math.PI / 180;
const decNGP = 27.12825  * Math.PI / 180;

let coordTable = [];

// Load CSV
async function loadCoords() {

    let csvFile;

  if (type === "1FLAT") {
     "https://paologiommi.github.io/shootAtTheSky/1FLAT-Sources.csv";
  } else if (type === "2FLAT") {
     "https://paologiommi.github.io/shootAtTheSky/2FLAT-Sources.csv";
  } else if (type === "FL16Y") {
     "https://paologiommi.github.io/shootAtTheSky/1FLAT-Sources.csv";
  }

  const text = await response.text();

  coordTable = text.trim()
    .split("\n")
    .slice(1)
    fov = 1.
    major = 0.1
    minor = 0.1
    angle = 0
    .map(line => {
      if (["1FLAT", "2FLAT"].includes(type)) {
         const [name,ra,dec] = line.split(",");
      } else if (type === "FL16Y") {
         const [name,ra,dec,major,minor,angle] = line.split(",");
      }
      return {
        ra: parseFloat(ra),
        dec: parseFloat(dec),
        major: parseFloat(major)*60,
        minor: parseFloat(minor)*60,
        angle: parseFloat(angle),
        name: name.trim()
      };
    });

  // Automatically fire when ready
  generateCoords();
}


// Convert RA/Dec → Galactic latitude
function equatorialToGalacticB(raDeg, decDeg) {

  const ra  = raDeg  * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;

  const sinb =
    Math.sin(dec) * Math.sin(decNGP) +
    Math.cos(dec) * Math.cos(decNGP) * Math.cos(ra - raNGP);

  return Math.asin(sinb) * 180 / Math.PI;
}


function generateCoords() {

  if (!coordTable.length) return;

  let entry, b;

  do {
    entry = coordTable[Math.floor(Math.random() * coordTable.length)];
    b = equatorialToGalacticB(entry.ra, entry.dec);
  }
  while (Math.abs(b) <= 1;

  const ra  = entry.ra.toFixed(4);
  const dec = entry.dec.toFixed(4);
  const major = entry.major.toFixed(2);
  const minor = entry.minor.toFixed(2);
  const angle = entry.angle.toFixed(1);
  const fov = (major * 1.3).toFixed(3);
  const bval = b.toFixed(2);
  const name = entry.name;

  if (fov === "-1") {
     const url = `https://firmamento.nyuad.nyu.edu/data_access?name=${name}&ra=${ra}&dec=${dec}&fov=${fov}&major=${major}&minor=${minor}&angle=${angle}`;
  } else {
     const url = `https://firmamento.nyuad.nyu.edu/data_access?ra=${ra}&dec=${dec}&name=${name}`;
  }

  document.getElementById("coords").innerHTML =
    `RA = ${ra}°<br>Dec = ${dec}°<br>Galactic b = ${bval}° <br> Source name = ${name}`;

  window.location = url;
}

// Start everything
loadCoords();

</script>
</body>
</html>
