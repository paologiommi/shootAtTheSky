<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A shot at eRASS1 sources with no radio emission → Firmamento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .coords {
      font-size: 1.1em;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>A shot at eRASS1 sources with no radio emission and Fx > 3.e-13 erg/cm2/s (|b| &gt; 10°) </h2>

<button onclick="generateCoords()" style="border:none; background:none; padding:0; cursor:pointer;">
  <img src="https://paologiommi.github.io/shootAtTheSky/shoot.jpg" width="55">
</button>

<div class="coords" id="coords"></div>


<script>

// Galactic conversion constants (J2000)
const raNGP  = 192.85948 * Math.PI / 180;
const decNGP = 27.12825  * Math.PI / 180;

let coordTable = [];

// Load CSV
async function loadCoords() {

  const response = await fetch("https://paologiommi.github.io/shootAtTheSky/erassNoRadio.csv");
  const text = await response.text();

  coordTable = text.trim()
    .split("\n")
    .slice(1)
    .map(line => {
      const [name,ra,dec] = line.split(",");
      return {
        ra: parseFloat(ra),
        dec: parseFloat(dec)
      };
    });

  // Automatically fire when ready
  generateCoords();
}


// Convert RA/Dec → Galactic latitude
function equatorialToGalacticB(raDeg, decDeg) {

  const ra  = raDeg  * Math.PI / 180;
  const dec = decDeg * Math.PI / 180;

  const sinb =
    Math.sin(dec) * Math.sin(decNGP) +
    Math.cos(dec) * Math.cos(decNGP) * Math.cos(ra - raNGP);

  return Math.asin(sinb) * 180 / Math.PI;
}


function generateCoords() {

  if (!coordTable.length) return;

  let entry, b;

  do {
    entry = coordTable[Math.floor(Math.random() * coordTable.length)];
    b = equatorialToGalacticB(entry.ra, entry.dec);
  }
  while (Math.abs(b) <= 10);

  const ra  = entry.ra.toFixed(5);
  const dec = entry.dec.toFixed(5);
  const bval = b.toFixed(2);

  const url = `https://firmamento.nyuad.nyu.edu/data_access?ra=${ra}&dec=${dec}&fov=0.2&minor=0.15&major=0.15&angle=0.0`;

  document.getElementById("coords").innerHTML =
    `RA = ${ra}°<br>Dec = ${dec}°<br>Galactic b = ${bval}°`;

  window.open(url, "_blank");
}

// Start everything
loadCoords();

</script>
</body>
</html>
